version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: krypt-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Cache
  redis:
    image: redis:7-alpine
    container_name: krypt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: krypt-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # Management Web UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Auth Microservice
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: krypt-auth-service
    environment:
      - PORT=5001
      - DATABASE_URL=postgres://postgres:postgres_password_1234@postgres:5432/postgres
      - JWT_SECRET=krypt_shared_jwt_secret_key_12345
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5001"

  # 5. Diary Microservice
  diary-service:
    build:
      context: ./services/diary
      dockerfile: Dockerfile
    container_name: krypt-diary-service
    environment:
      - PORT=5002
      - DATABASE_URL=postgres://postgres:postgres_password_1234@postgres:5432/postgres
      - JWT_SECRET=krypt_shared_jwt_secret_key_12345
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5002:5002"

  # 6. Streak Microservice
  streak-service:
    build:
      context: ./services/streak
      dockerfile: Dockerfile
    container_name: krypt-streak-service
    environment:
      - PORT=5003
      - DATABASE_URL=postgres://postgres:postgres_password_1234@postgres:5432/postgres
      - JWT_SECRET=krypt_shared_jwt_secret_key_12345
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5003:5003"

  # 7. Frontend Service (Next.js)
  frontend-service:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: krypt-frontend-service
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - NEXT_PUBLIC_API_GATEWAY_URL=http://localhost
      - JWT_SECRET=krypt_shared_jwt_secret_key_12345
    depends_on:
      - auth-service
      - diary-service
      - streak-service
    ports:
      - "3000:3000"

  # 8. API Gateway (Nginx)
  gateway:
    image: nginx:alpine
    container_name: krypt-api-gateway
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend-service
      - auth-service
      - diary-service
      - streak-service

  # 9. Prometheus Monitoring
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: krypt-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    depends_on:
      - auth-service
      - diary-service
      - streak-service

  # 10. Grafana Analytics
  grafana:
    image: grafana/grafana:10.0.0
    container_name: krypt-grafana
    ports:
      - "4000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  grafana-storage:
