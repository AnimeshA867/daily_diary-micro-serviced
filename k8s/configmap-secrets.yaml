apiVersion: v1
kind: ConfigMap
metadata:
  name: krypt-config
  namespace: krypt
data:
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "postgres"
  REDIS_URL: "redis://redis:6379"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
  DATABASE_URL: "postgres://postgres:postgres_password_1234@postgres:5432/postgres"

---
apiVersion: v1
kind: Secret
metadata:
  name: krypt-secrets
  namespace: krypt
type: Opaque
data:
  # Values are base64 encoded strings
  # 'postgres_password_1234' -> cG9zdGdyZXNfcGFzc3dvcmRfMTIzNA==
  # 'krypt_shared_jwt_secret_key_12345' -> a3J5cHRfc2hhcmVkX2p3dF9zZWNyZXRfa2V5XzEyMzQ1
  POSTGRES_PASSWORD: cG9zdGdyZXNfcGFzc3dvcmRfMTIzNA==
  JWT_SECRET: a3J5cHRfc2hhcmVkX2p3dF9zZWNyZXRfa2V5XzEyMzQ1
