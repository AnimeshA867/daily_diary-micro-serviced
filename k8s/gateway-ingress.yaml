apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: krypt-ingress
  namespace: krypt
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Enable cookie affinity if needed, but stateless JWT does not require it
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Route auth service
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 5001

          # Route diary service
          - path: /api/diary
            pathType: Prefix
            backend:
              service:
                name: diary-service
                port:
                  number: 5002

          # Route streak service
          - path: /api/streak
            pathType: Prefix
            backend:
              service:
                name: streak-service
                port:
                  number: 5003

          # Catch-all route to next.js frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
