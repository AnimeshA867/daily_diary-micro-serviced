
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streak-service
  namespace: krypt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streak-service
  template:
    metadata:
      labels:
        app: streak-service
    spec:
      containers:
        - name: streak-service
          image: krypt-streak-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5003
          env:
            - name: PORT
              value: "5003"
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: krypt-config
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: krypt-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: krypt-config
                  key: REDIS_URL
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: krypt-config
                  key: RABBITMQ_URL
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 20
            periodSeconds: 10

---

apiVersion: v1
kind: Service
metadata:
  name: streak-service
  namespace: krypt
spec:
  ports:
    - port: 5003
  selector:
    app: streak-service

