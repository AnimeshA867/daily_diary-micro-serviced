name: Krypt Microservices CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # Job 1: Test and Build Verification
  test_and_verify:
    name: Build & Verify Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            services/auth/package-lock.json
            services/diary/package-lock.json
            services/streak/package-lock.json
            services/frontend/package-lock.json

      # Build Auth Microservice
      - name: Build Auth Service
        run: |
          cd services/auth
          npm ci
          npm run build

      # Build Diary Microservice
      - name: Build Diary Service
        run: |
          cd services/diary
          npm ci
          npm run build

      # Build Streak Microservice
      - name: Build Streak Service
        run: |
          cd services/streak
          npm ci
          npm run build

      # Build Frontend Next.js Application
      - name: Build Next.js Frontend
        run: |
          cd services/frontend
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_GATEWAY_URL: ""
          JWT_SECRET: "temp_jwt_secret_key_for_compilation"

  # Job 2: Continuous Deployment (CD) on the self-hosted VM
  deploy_to_server:
    name: Deploy to Server
    needs: test_and_verify
    runs-on: self-hosted
    if: github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy locally on the VM
        run: |
          chmod +x deploy.sh
          ./deploy.sh
