global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:5001"]

  - job_name: "diary-service"
    static_configs:
      - targets: ["diary-service:5002"]

  - job_name: "streak-service"
    static_configs:
      - targets: ["streak-service:5003"]
